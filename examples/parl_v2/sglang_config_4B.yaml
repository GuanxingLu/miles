# PARL v2 frozen-subagent topology for Qwen3-4B (8 GPUs, TP=2).
#
# Splits the colocate rollout pool into two SGLang models sharing the
# same router cluster:
#   - actor:    live policy, receives RL weight updates
#   - subagent: frozen at args.hf_checkpoint (true hard-frozen),
#               called by examples.parl_v2.tool.assign_task
#
# ORDER MATTERS: the FIRST model listed under sglang: becomes the
# default/live router — miles sets args.sglang_router_ip/port from it
# in start_rollout_servers (rollout.py:1037-1038), and generate.py /
# rollout_log.py compute `live_router_url` from those args. Reordering
# so `subagent` comes first would invert the semantics (orchestrator
# would hit the frozen engine). Keep actor first.
#
# Total num_gpus across both groups MUST equal --rollout-num-gpus
# (= --actor-num-gpus under --colocate). Each group's num_gpus must
# be divisible by --rollout-num-gpus-per-engine (=2 for 4B).
sglang:
  - name: actor
    update_weights: true
    server_groups:
      - worker_type: regular
        num_gpus: 6        # 3 engines × TP=2
  - name: subagent
    # model_path empty -> falls back to args.hf_checkpoint (hard-frozen).
    # For heterogeneous-size ablation, set an explicit path here
    # (e.g. /workspace/miles/MODEL/Qwen3-0.6B).
    update_weights: false
    server_groups:
      - worker_type: regular
        num_gpus: 2        # 1 engine × TP=2
        # CRITICAL for frozen engines: miles colocate releases weights on
        # offload, and live engines get them back via IPC after every train
        # step. The frozen engine is filtered out of the IPC path
        # (update_weights: false) so its weights would die after the first
        # offload/resume cycle. enable_weights_cpu_backup makes SGLang keep
        # a CPU-pinned copy of weights across release/resume — the same
        # mechanism miles already enables for LoRA engines (see
        # miles/backends/sglang_utils/sglang_engine.py:657-658). Costs about
        # one model's worth of pinned host RAM for the whole engine,
        # sharded across TP ranks (~8 GB total for Qwen3-4B bf16 at TP=2 =
        # ~4 GB per rank). Check total host RAM before scaling up to bigger
        # subagents (e.g. Qwen3-32B ≈ 64 GB total / 32 GB per rank at TP=2).
        overrides:
          enable_weights_cpu_backup: true
