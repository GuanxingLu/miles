# PARL v2 frozen-subagent topology for Qwen3-30B-A3B (16 GPUs, 2 nodes, TP=4).
# 2-node variant of sglang_config_30B_A3B.yaml.
#
# Layout for 2 × 8-GPU nodes (16 GPUs total):
#   actor    : 8 GPUs → 2 engines × TP=4 (live policy, receives RL updates)
#   subagent : 8 GPUs → 2 engines × TP=4 (frozen at SFT checkpoint)
sglang:
  - name: actor
    update_weights: true
    server_groups:
      - worker_type: regular
        num_gpus: 8        # 2 engines × TP=4
  - name: subagent
    update_weights: false
    server_groups:
      - worker_type: regular
        num_gpus: 8        # 2 engines × TP=4
        overrides:
          enable_weights_cpu_backup: true
