# PARL v2 frozen-subagent topology for Qwen3-30B-A3B (8 GPUs, TP=4).
# See sglang_config_4B.yaml for design notes (including the
# load-bearing order constraint: actor must be listed first).
#
# Layout for single 8-GPU node:
#   actor    : 4 GPUs → 1 engine × TP=4 (live policy, receives RL updates)
#   subagent : 4 GPUs → 1 engine × TP=4 (frozen at SFT checkpoint)
sglang:
  - name: actor
    update_weights: true
    server_groups:
      - worker_type: regular
        num_gpus: 4        # 1 engine × TP=4
  - name: subagent
    update_weights: false
    server_groups:
      - worker_type: regular
        num_gpus: 4        # 1 engine × TP=4
        # CRITICAL for frozen engines: see sglang_config_4B.yaml for details.
        # Cost: ~60 GB pinned host RAM total for Qwen3-30B-A3B bf16 at TP=4
        # (≈15 GB per rank).
        overrides:
          enable_weights_cpu_backup: true
