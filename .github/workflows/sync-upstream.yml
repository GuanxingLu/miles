name: Sync main with upstream

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase onto upstream/main
        run: |
          git config user.name "Guanxing Lu"
          git config user.email "747398423@qq.com"
          git remote add upstream https://github.com/radixark/miles.git
          git fetch upstream main

          if git merge-base --is-ancestor HEAD upstream/main; then
            git merge --ff-only upstream/main
            git push origin main
          else
            git rebase upstream/main
            git push --force-with-lease origin main
          fi
